# TODO
---
name: Login AWS ECR
description: Login AWS ECR
inputs:
  aws-region:
    description: AWS region
    required: true
runs:
  using: "composite"
  steps:
    - uses: aps831/gh-actions/action-calculate-aws-ecr-registry@feat/deploy
      id: registry
      with:
        aws-region: ${{ inputs.aws-region }}

    - shell: bash
      run:
        aws ecr get-login-password --region ${{ inputs.aws-region }} | docker login --username AWS
        --password-stdin ${{ steps.registry.outputs.registry }}
