---
name: Update Latest Deployment File
description: Update latest deployment file
inputs:
  versions:
    description: Deployment versions in properties file format
    required: true
  env:
    description: Environment
    required: true
outputs:
  filename:
    description: Deployment versions filename
    value: ${{ steps.file.outputs.filename }}
runs:
  using: "composite"
  steps:
    - uses: aps831/gh-actions/action-latest-deployment-file-write@feat/latest-deployment
      id: file
      with:
        versions: ${{ inputs.versions }}
        env: ${{ inputs.env }}

    - uses: aps831/gh-actions/git-add-file@master
      with:
        files: ${{ steps.file.outputs.filename }}
